<!DOCTYPE html>
<html lang="pt"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <link rel="shortcut icon" th:href="@{/imgs/favicon.ico}" type="image/x-icon">

    <title>Devoluções</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>
<header>
    <nav>
        <a class="link" href="/">Home</a>
        <a class="link" href="/alunos" >Gerir Alunos</a>
        <a class="link" href="/livros">Gerir Livros</a>
        <a class="link" href="/emprestimos">Gerir Emprestimos</a>
        <a class="link" href="/devolucoes">Gerir Devoluções</a>
        <a class="link" href="/logout">Sair</a>
    </nav>
</header>
<section>

    <div id = "acima_formulario">
<h1>Devoluções</h1>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Data Devolução</th>
        <th>Estado</th>
    </tr>

    <tr th:each="devolucao : ${lista}">

        <td th:text="${devolucao.id}"></td>

        <td th:text="${devolucao.dataDevolucao}"></td>

        <td th:text="${devolucao.estado}"></td>

    </tr>

</table>
    </div>

    <div id ="formulario">
<h2>Nova Devolução</h2>

<form action="/devolucoes"
      method="post">

    <div class = "campo_form">
    <input type="number"
           name="emprestimoId"
           placeholder="ID do empréstimo">
    </div>

    <div class = "campo_form">
        <input type="date"
               name="dataDevolucao"
               placeholder="Data">
    </div>

    <div class = "campo_form">
    <input type="text"
           name="estado"
           placeholder="Estado">
    </div>

    <button type="submit">
        Registar
    </button>

</form>
    </div>
</section>

</body>
</html>
